name: Tag Claude Code in GH

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'MEMBER')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'MEMBER')) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       (github.event.review.author_association == 'OWNER' ||
        github.event.review.author_association == 'COLLABORATOR' ||
        github.event.review.author_association == 'MEMBER'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Snapshot main
        id: main_snapshot
        run: |
          git fetch --depth=1 origin main
          echo "sha=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          branch_prefix: "claude-"
          branch_name_template: "{{prefix}}{{entityType}}-{{entityNumber}}-{{description}}-{{timestamp}}"
          track_progress: true
          claude_args: "--allowedTools Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            After making changes, always run `python3 -m pytest tests/ -v` and fix
            any failures before proceeding. Once all tests pass, create a pull request
            from your branch using `gh pr create` with a clear title and description.
            When triggered from a GitHub issue, include "Closes #<issue_number>" in the
            PR body using the issue number from the triggering event.
            Finally, post a comment on the triggering issue summarizing what was done
            and linking to the PR (use `gh issue comment <issue_number> --body "..."`
            with the actual issue number from the triggering event).

      - name: Create QA safety branch from main
        if: steps.claude.conclusion == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.claude.outputs.branch_name }}"
          MAIN_SHA="${{ steps.main_snapshot.outputs.sha }}"
          if [ -z "$BRANCH" ]; then
            echo "No feature branch found, skipping QA branch creation"
            exit 0
          fi
          if [ -z "$MAIN_SHA" ]; then
            echo "No main snapshot SHA found, failing QA branch creation"
            exit 1
          fi
          QA_BRANCH="qa/${BRANCH}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${QA_BRANCH}" >/dev/null 2>&1; then
            echo "QA branch already exists, skipping: $QA_BRANCH"
            exit 0
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/heads/${QA_BRANCH}" \
            -f sha="$MAIN_SHA"
          echo "Created safety branch: $QA_BRANCH"
