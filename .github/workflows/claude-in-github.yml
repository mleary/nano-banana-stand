name: Tag Claude Code in GH

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'MEMBER')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'MEMBER')) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       (github.event.review.author_association == 'OWNER' ||
        github.event.review.author_association == 'COLLABORATOR' ||
        github.event.review.author_association == 'MEMBER'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          branch_prefix: "claude-"
          branch_name_template: "{{prefix}}{{entityType}}-{{entityNumber}}-{{description}}-{{timestamp}}"
          claude_args: "--allowedTools Bash,Edit,Write,Read,Glob,Grep"
          settings: |
            After making changes, always run `python3 -m pytest tests/ -v` and fix
            any failures before proceeding. Once all tests pass, create a pull request
            from your branch using `gh pr create` with a clear title and description.
            When triggered from a GitHub issue, include "Closes #<issue_number>" in the
            PR body using the issue number from the triggering event.

      - name: Create QA safety branch from main
        if: steps.claude.outputs.branch_name != ''
        run: |
          BRANCH="${{ steps.claude.outputs.branch_name }}"
          QA_BRANCH="qa-${BRANCH}"
          git fetch origin main
          git checkout -b "$QA_BRANCH" origin/main
          git push origin "$QA_BRANCH"
          echo "Created safety branch: $QA_BRANCH"